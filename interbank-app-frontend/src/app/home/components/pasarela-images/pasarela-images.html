@if (images().length>0) {
    <div class="relative h-125">
        <img [src]="image()" alt="" class="h-125 bg-slate-200 w-full" >
        <div class="absolute z-50 top-1/2 -translate-y-1/2 px-72 space-y-5">
            <h2 class="text-white text-4xl font-semibold" >Eleva tu nivel con un <br>Apple Pack</h2>
            <h4 class="text-white text-lg" >Registra hoy tu DNI y participa por un iPhone 16+ <br>Apple Watch.</h4>
            <app-button-custome text="Hazlo ahora" type="white" />
        </div>
        <div class="absolute flex justify-between top-1/2 -translate-y-1/2 w-full px-main">
            <i class="fa-solid fa-angle-left  text-white text-4xl cursor-pointer"></i>
            <i class="fa-solid fa-angle-right text-white text-4xl cursor-pointer"></i>
        </div>
    </div>
}@else {
    <img src="" alt="" class="h-125 bg-slate-200 animate-pulse" >
}
