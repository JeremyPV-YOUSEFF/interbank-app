<div class="flex flex-col gap-y-10">

    <label class="flex gap-x-4 justify-between items-start">

        <div class="flex space-x-6 items-center text-tiny border-b border-slate-400">
            <h4>DNI</h4>
            <i class="fa-solid fa-angle-down"></i>
        </div>

        <div class="flex-1">
            <app-form-custome typeInput="text" [formFieldData]="loginForm.dni" placeholderContent="Número de documento"  [opt]="4" ></app-form-custome>
            <!-- <input 
            class="outline-none border-b w-full border-slate-400 text-sm"
            type="password" placeholder="Número de documento"> -->
        </div>

        @if (false) {
            <ul>
                <li>DNI</li>
                <li>CE</li>
                <li>PAS</li>
            </ul>
        }
        
    </label>

    <app-form-custome typeInput="password" [formFieldData]="loginForm.password" placeholderContent="Contraseña"  [opt]="4" ></app-form-custome>

    <label class="flex gap-x-3">
        <input 
        class="outline-none border-b border-slate-400 text-sm"
        type="checkbox" placeholder="Contraseña">
        <h4 class="text-sm text-letter" >Recordar documento</h4>    
    </label>

    <div class="flex justify-center">
        <button 
        type="button"
        (click)="onClick($event)"
        class="bg-3 uppercase py-2 px-8 rounded-lg text-tiny text-white hover:bg-card4 cursor-pointer font-semibold" >Siguiente</button>
    </div>

    
</div>
